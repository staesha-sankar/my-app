  <body>
    <!-- <label for="username">Username:</label>

    <!-- 90% forms elements differ `type` input -->

    <!-- Validation works if wrapped with `form` -->
    <form class="form-container">
      <label
        >Username:
        <input type="text" placeholder="John" minlength="8" maxlength="12" />
      </label>
      <label
        >Password:
        <input type="password" placeholder="password" required />
      </label>
      <label
        >Age:
        <input type="number" placeholder="20" min="18" max="60" />
      </label>
      <label>
        Email:
        <input type="email" />
      </label>

      <h3>Hobbies</h3>

      <label>
        <input type="checkbox" name="hobbies" value="cricket" checked /> Cricket
      </label>
      <label>
        <input type="checkbox" name="hobbies" value="football" disabled/> Football
      </label>
      <label>
        <input type="checkbox" name="hobbies" value="chess" checked/> Chess
      </label>
      <label>
        <input type="checkbox" name="hobbies" value="hr" /> Horse Riding
      </label>
      <button>Submit</button>
    </form>
